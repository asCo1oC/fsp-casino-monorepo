spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:fsp_casino}
    username: ${POSTGRES_USER:casino_user}
    password: ${POSTGRES_PASSWORD:casino_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-32-chars-minimum-pad-here!}
    expirationMs: ${JWT_EXPIRATION_MS:86400000}
  game:
    waitingTimerSeconds: 60
    schedulerIntervalMs: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui
    tryItOutEnabled: true
  api-docs:
    path: /v3/api-docs
